<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Aero Div</title>
        <style>
            body {
                background-color: #c0c0c0;
                color: black;
            }
            h1 {
                color: black;
                border: 2px solid;
                border-color: black;
                padding: 1px;
                text-decoration: none;
                font-family: sans-serif;
                display: inline-block;
            }
            a.w {
                color: black;
                background-color: #c0c0c0;
                border: 2px solid;
                border-color: #ffffff #5f5f5f #5f5f5f #ffffff;
                padding: 5px 15px;
                text-decoration: none;
                font-family: sans-serif;
                display: inline-block;
                cursor: pointer;
            }
            a.w:active {
                color: black;
                border-color: #5f5f5f #ffffff #ffffff #5f5f5f;
            }
            a.wip {
                background-color: #c0c0c0;
                background-color: #0c0c0c;
                background-image: 
                    linear-gradient(#444 1px, transparent 1px), 
                    linear-gradient(90deg, #444 1px, transparent 1px);
                background-size: 10px 10px;
  
                /*THE BUTTON*/
                border-width: 2px;
                border-style: solid;
                border-color: #5f5f5f #ffffff #ffffff #5f5f5f;
  
                padding: 10px 20px;
                color: #888;
                cursor: not-allowed;
            }
            p.i {
                color: black;
                background-color: #c0c0c0;
                border: 1px solid;
                border-color: #5f5f5f #ffffff #ffffff #5f5f5f;
                padding: 1px;
                text-decoration: none;
                font-family: sans-serif;
            }
            div.fm {
                background-color: #c0c0c0;
                border: 1px solid;
                border-color: #5f5fff #ffffff #ffffff #5f5fff;
                padding: 1px;
                font-family: sans-serif;
            }
        </style>
    </head>
    <body>
        <p class="i">/m_co/aero</p>
        <h1>M Co. Aero Division</h1>
        <h5>This is fictional.</h5>
        <hr>
        <div class="fm">
            <ul>
                <li>Propellor aircraft
                    <ul>
                        <li><a class="wip">B-1E6EC3P.I</a></li>
                        <li><a class="wip">F-1E8EC2P.I</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </body>
</html>
